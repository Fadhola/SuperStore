<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superstore Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>

    <!-- <header>
        <div class="option">Superstore Analytics Dashboard</div>
    </header> -->

    <main class="container">
        <aside class="sidebar">
            <h1 id="header" class="poppins-bold">Superstore Analytics Dashboard</h1>
            <div class="filters">
                <div class="filter-item">
                    <label class="poppins-regular">Select Year:</label>
                    <div class="dropdown">
                        <button class="dropdown-button poppins-regular" onclick="toggleDropdown('yearFilter')">All Years</button>
                        <div id="yearFilter" class="dropdown-content"></div>
                    </div>
                </div>
            
                <div class="filter-item">
                    <label class="poppins-regular">Select City:</label>
                    <div class="dropdown">
                        <button class="dropdown-button poppins-regular" onclick="toggleDropdown('cityFilter')">All City</button>
                        <div id="cityFilter" class="dropdown-content"></div>
                    </div>
                </div>
            
                <div class="filter-item">
                    <label class="poppins-regular">Select State:</label>
                    <div class="dropdown">
                        <button class="dropdown-button poppins-regular" onclick="toggleDropdown('stateFilter')">All States</button>
                        <div id="stateFilter" class="dropdown-content"></div>
                    </div>
                </div>
            
                <div class="filter-item">
                    <label class="poppins-regular">Select Category:</label>
                    <div class="dropdown">
                        <button class="dropdown-button poppins-regular" onclick="toggleDropdown('categoryFilter')">All Categories</button>
                        <div id="categoryFilter" class="dropdown-content"></div>
                    </div>
                </div>
            
                <div class="filter-item">
                    <button id="filterButton" class="poppins-medium">Filter</button>
                </div>
            </div>
        </aside>
        <button id="sidebarToggle">☰</button>

        <!-- Main Content -->
        <div class="content">
            <div class="summary-container" id="summaryContainer">
                <div class="summary-item">
                    <p class="summary-value" id="totalSales"></p>
                    <p class="summary-label">Total Sales</p>
                </div>
                <div class="summary-item">
                    <p class="summary-value" id="averageDiscount"></p>
                    <p class="summary-label">Avg. Discount</p>
                </div>
                <div class="summary-item">
                    <p class="summary-value" id="averageSales"></p>
                    <p class="summary-label">Avg. Sales</p>
                </div>
                <div class="summary-item">
                    <p class="summary-value" id="mostFrequentCustomer"></p>
                    <p class="summary-label">Top Customer</p>
                </div>
                <div class="summary-item">
                    <p class="summary-value" id="orderDateRange"></p>
                    <p class="summary-label">Order Date Range</p>
                </div>
            </div>
            

            <div id="map"></div>
            <div class="chart-container">
                <div class="chart-wrapper">
                    <canvas id="discountSalesChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="salesProfitQuantityChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="avgDiscountPerYearChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="profitMarginChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="salesByCategoryChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="salesTrendChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="topCitiesChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="shipModeChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="segmentChart"></canvas>
                </div>
            </div>
            
        </div>
    </main>

    <footer>
        <p class="poppins-regular">&copy; 2024 Enhanced Analytics Dashboard</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@latest/dist/chartjs-plugin-dragdata.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="index.js"></script>
</body>
</html>
